<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inspiration | Safarnama</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh; 
            margin: 0;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&q=80&w=2000') center/cover no-repeat;
        }
        .card { 
            background: rgba(255, 255, 255, 0.9); 
            padding: 2.5rem; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
            width: 350px; 
            text-align: center;
            backdrop-filter: blur(10px);
        }

        h2 { font-size: 1.4rem; color: #2d5a27; margin-bottom: 10px; }
        p { font-size: 1rem; color: #555; font-style: italic; }
        
        button { 
            margin-top: 20px; 
            padding: 12px 25px; 
            cursor: pointer; 
            border: none; 
            background: #d4a373; 
            color: #fff; 
            border-radius: 50px; 
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: #c09060; transform: scale(1.05); }
    </style>
</head>
<body>

<div class="card" id="quote-box">
    <div id="content">
        <h2 id="quote">"Travel is the only thing you buy that makes you richer."</h2>
        <p id="author">- Anonymous</p>
    </div>
    <button onclick="fetchQuote()">New Inspiration</button>
</div>

<script>
    async function fetchQuote() {
        const quoteEl = document.getElementById('quote');
        const authorEl = document.getElementById('author');

        quoteEl.innerText = "Fetching inspiration...";
        authorEl.innerText = "";

        try {
            const response = await fetch('https://dummyjson.com/quotes/random');
            if (!response.ok) throw new Error("Failed to fetch");
            const data = await response.json();

            quoteEl.innerText = `"${data.quote}"`;
            authorEl.innerText = `- ${data.author}`;
        } catch (error) {
            quoteEl.innerText = "Oops!";
            authorEl.innerText = "Could not load quote.";
        }   
    }

</script>

</body>
</html>
